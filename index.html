<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>PIXEL VAULT — GBC Emulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Nunito', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Bubbles ── */
    .bubbles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
    .bubble  { position:absolute; bottom:-100px; border-radius:50%; opacity:0.15; animation:rise linear infinite; }
    .bubble:nth-child(1)  { width:60px; height:60px; left:5%;  background:#ff6fd8; animation-duration:8s;  animation-delay:0s;   }
    .bubble:nth-child(2)  { width:40px; height:40px; left:15%; background:#3bc4f2; animation-duration:10s; animation-delay:1s;   }
    .bubble:nth-child(3)  { width:80px; height:80px; left:25%; background:#ffdd57; animation-duration:7s;  animation-delay:2s;   }
    .bubble:nth-child(4)  { width:50px; height:50px; left:40%; background:#a8ff78; animation-duration:11s; animation-delay:0.5s; }
    .bubble:nth-child(5)  { width:70px; height:70px; left:55%; background:#ff9a9e; animation-duration:9s;  animation-delay:1.5s; }
    .bubble:nth-child(6)  { width:35px; height:35px; left:65%; background:#f9ca24; animation-duration:12s; animation-delay:3s;   }
    .bubble:nth-child(7)  { width:90px; height:90px; left:75%; background:#6c5ce7; animation-duration:8s;  animation-delay:2.5s; }
    .bubble:nth-child(8)  { width:45px; height:45px; left:85%; background:#fd79a8; animation-duration:10s; animation-delay:4s;   }
    .bubble:nth-child(9)  { width:55px; height:55px; left:92%; background:#00cec9; animation-duration:9s;  animation-delay:1s;   }
    .bubble:nth-child(10) { width:30px; height:30px; left:33%; background:#e17055; animation-duration:13s; animation-delay:5s;   }
    @keyframes rise {
      0%   { transform:translateY(0) scale(1); opacity:0.15; }
      50%  { opacity:0.25; }
      100% { transform:translateY(-110vh) scale(1.2); opacity:0; }
    }

    /* ════════════════════════════════
       HOME SCREEN
    ════════════════════════════════ */
    #screen-home {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      padding:48px 20px 40px;
    }
    .logo-title {
      font-family:'Press Start 2P', cursive;
      font-size:clamp(16px,5vw,32px);
      background:linear-gradient(90deg,#ff6fd8,#3bc4f2,#ffdd57,#a8ff78,#ff6fd8);
      background-size:300%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shine 4s linear infinite;
      letter-spacing:2px; text-align:center;
    }
    @keyframes shine { 0%{background-position:0%} 100%{background-position:300%} }
    .logo-sub { margin-top:10px; font-size:13px; color:#c8c8ff; letter-spacing:3px; text-transform:uppercase; margin-bottom:32px; }

    .card {
      width:100%; max-width:460px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:24px; padding:32px 24px;
      backdrop-filter:blur(14px);
      box-shadow:0 8px 40px rgba(0,0,0,0.4);
    }
    .section-title { font-family:'Press Start 2P',cursive; font-size:10px; color:#ffdd57; margin-bottom:16px; letter-spacing:1px; }
    .system-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:linear-gradient(135deg,#a855f7,#ec4899);
      border-radius:50px; padding:8px 20px;
      font-weight:900; font-size:15px; margin-bottom:24px;
      box-shadow:0 4px 20px rgba(168,85,247,0.4);
    }

    .drop-zone {
      border:3px dashed rgba(255,255,255,0.25); border-radius:18px;
      padding:38px 20px; text-align:center; cursor:pointer;
      transition:all 0.3s; background:rgba(255,255,255,0.04);
      position:relative; overflow:hidden;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color:#ff6fd8; background:rgba(255,111,216,0.1); transform:scale(1.01); }
    .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .drop-icon { font-size:52px; margin-bottom:10px; animation:bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .drop-text { font-size:15px; font-weight:700; color:#e2d9f3; margin-bottom:4px; }
    .drop-sub  { font-size:12px; color:#9b8ec4; }

    .mobile-pick { display:none; flex-direction:column; align-items:center; gap:12px; }
    .pick-btn {
      width:100%; padding:22px; border-radius:20px; border:none;
      background:linear-gradient(135deg,#a855f7,#ec4899,#3bc4f2);
      background-size:200%; animation:btnshine 3s linear infinite;
      color:#fff; font-size:17px; font-weight:900; cursor:pointer;
      box-shadow:0 6px 28px rgba(168,85,247,0.4);
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .pick-btn:active { transform:scale(0.97); }
    .pick-sub { font-size:12px; color:#9b8ec4; }
    @keyframes btnshine { 0%{background-position:0%} 100%{background-position:200%} }

    @media (hover:none) and (pointer:coarse) {
      .drop-zone   { display:none !important; }
      .mobile-pick { display:flex !important; }
    }

    .file-info { display:none; align-items:center; gap:12px; margin-top:16px; background:rgba(168,255,120,0.1); border:1px solid rgba(168,255,120,0.3); border-radius:14px; padding:14px 16px; }
    .file-info.show { display:flex; }
    .file-name { font-weight:700; font-size:13px; color:#a8ff78; word-break:break-all; }
    .file-size { font-size:11px; color:#78c454; margin-top:2px; }

    .formats { margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .fmt-tag { background:rgba(255,255,255,0.1); border-radius:8px; padding:4px 12px; font-size:11px; font-weight:700; color:#c8c8ff; }

    .play-btn {
      display:block; width:100%; margin-top:22px; padding:16px;
      font-family:'Press Start 2P',cursive; font-size:13px; color:#1a1a2e;
      background:linear-gradient(135deg,#ffdd57,#ff6fd8,#3bc4f2);
      background-size:200%; border:none; border-radius:16px; cursor:pointer;
      box-shadow:0 6px 24px rgba(255,111,216,0.4);
      animation:btnshine 3s linear infinite;
      opacity:0.4; pointer-events:none; transition:all 0.3s;
    }
    .play-btn.active { opacity:1; pointer-events:all; }
    .play-btn:hover  { transform:translateY(-2px); }

    /* ════════════════════════════════
       GAME SCREEN
    ════════════════════════════════ */
    #screen-game {
      display:none;
      position:relative; z-index:1;
      flex-direction:column; align-items:center;
      height:100dvh;
      overflow:hidden;
    }

    /* Top bar */
    .topbar {
      width:100%; max-width:520px;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px; flex-shrink:0;
      background:rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }
    .back-btn {
      font-family:'Press Start 2P',cursive; font-size:8px; color:#ff6fd8;
      background:rgba(255,111,216,0.1); border:1px solid rgba(255,111,216,0.3);
      border-radius:8px; padding:7px 10px; cursor:pointer; transition:all 0.2s;
    }
    .back-btn:active { background:rgba(255,111,216,0.3); }
    .game-title { font-family:'Press Start 2P',cursive; font-size:7px; color:#ffdd57; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sys-badge { background:linear-gradient(135deg,#a855f7,#ec4899); border-radius:20px; padding:4px 10px; font-size:10px; font-weight:900; }

    /* Game canvas area */
    .game-area {
      width:100%; max-width:520px;
      flex-shrink:0;
      position:relative;
    }
    #game-container {
      width:100%;
      aspect-ratio:10/9;
      background:#000;
      overflow:hidden;
      box-shadow:0 0 0 3px #ff6fd8, 0 0 24px rgba(255,111,216,0.4);
      position:relative;
    }

    /* Loading overlay */
    #loading-overlay {
      position:absolute; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
      z-index:10;
    }
    #loading-overlay.hide { display:none; }
    .loading-icon { font-size:40px; animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .loading-text { font-family:'Press Start 2P',cursive; font-size:9px; color:#ff6fd8; animation:pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .error-text { font-family:'Press Start 2P',cursive; font-size:9px; color:#ff6fd8; text-align:center; line-height:2; padding:16px; }
    .progress-wrap { width:70%; background:rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; }
    .progress-bar  { height:5px; width:0%; background:linear-gradient(90deg,#ff6fd8,#3bc4f2); border-radius:8px; transition:width 0.3s; }

    /* ════════════════════════════════
       CLASSIC GAMEPAD
    ════════════════════════════════ */
    .gamepad-wrap {
      flex:1;
      width:100%; max-width:520px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:8px 20px 12px;
      gap:8px;
    }

    /* Select + Start row */
    .mid-btns {
      display:flex; gap:24px; align-items:center; justify-content:center;
    }
    .btn-mid {
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:20px;
      color:rgba(255,255,255,0.7);
      font-family:'Press Start 2P',cursive;
      font-size:7px;
      padding:7px 14px;
      cursor:pointer;
      user-select:none;
      transition:all 0.1s;
      letter-spacing:1px;
    }
    .btn-mid:active, .btn-mid.pressed {
      background:rgba(255,111,216,0.3);
      border-color:#ff6fd8;
      color:#fff;
      transform:scale(0.93);
    }

    /* D-pad + AB row */
    .main-btns {
      width:100%;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 8px;
    }

    /* D-pad */
    .dpad {
      width:130px; height:130px;
      position:relative;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      grid-template-rows:1fr 1fr 1fr;
    }
    .dpad-btn {
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.6);
      font-size:14px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      transition:all 0.1s;
      -webkit-tap-highlight-color:transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background:rgba(255,111,216,0.35);
      color:#fff;
    }
    .dpad-up    { grid-column:2; grid-row:1; border-radius:10px 10px 0 0; }
    .dpad-left  { grid-column:1; grid-row:2; border-radius:10px 0 0 10px; }
    .dpad-center{ grid-column:2; grid-row:2; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); }
    .dpad-right { grid-column:3; grid-row:2; border-radius:0 10px 10px 0; }
    .dpad-down  { grid-column:2; grid-row:3; border-radius:0 0 10px 10px; }

    /* A / B buttons */
    .ab-wrap {
      display:flex; gap:14px; align-items:center;
    }
    .btn-action {
      width:58px; height:58px;
      border-radius:50%;
      border:none;
      font-family:'Press Start 2P',cursive;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.1s;
      box-shadow:0 6px 16px rgba(0,0,0,0.4);
    }
    .btn-a {
      background:linear-gradient(135deg,#ff6fd8,#e040b0);
      color:#fff;
      box-shadow:0 6px 20px rgba(255,111,216,0.5);
    }
    .btn-b {
      background:linear-gradient(135deg,#3bc4f2,#1a9fd4);
      color:#fff;
      box-shadow:0 6px 20px rgba(59,196,242,0.4);
      margin-top:28px;
    }
    .btn-action:active, .btn-action.pressed {
      transform:scale(0.88);
      box-shadow:0 2px 8px rgba(0,0,0,0.4);
    }

    /* Button labels */
    .ab-label {
      font-family:'Press Start 2P',cursive;
      font-size:7px;
      color:rgba(255,255,255,0.4);
      text-align:center;
      margin-top:4px;
    }
    .ab-col { display:flex; flex-direction:column; align-items:center; }
  </style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div>
</div>

<!-- ══════════ HOME ══════════ -->
<div id="screen-home">
  <div class="logo-title">🎮 PIXEL VAULT</div>
  <div class="logo-sub">Game Boy Color Emulator</div>

  <div class="card">
    <div class="section-title">▶ SYSTEM</div>
    <div class="system-badge"><span>🟡</span> Game Boy Color</div>

    <div class="section-title">▶ LOAD ROM FILE</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="romFile" accept=".gbc,.gb" />
      <div class="drop-icon">📂</div>
      <div class="drop-text">Click or drag & drop ROM here</div>
      <div class="drop-sub">.gbc / .gb files only</div>
    </div>

    <div class="mobile-pick">
      <label class="pick-btn" onclick="document.getElementById('romFileMobile').click()">
        <span>📂</span> Choose ROM File
      </label>
      <input type="file" id="romFileMobile" accept=".gbc,.gb" style="display:none" />
      <div class="pick-sub">.gbc / .gb — stored on your device</div>
    </div>

    <div class="file-info" id="fileInfo">
      <div style="font-size:26px">🎮</div>
      <div>
        <div class="file-name" id="fileName">—</div>
        <div class="file-size" id="fileSize">—</div>
      </div>
    </div>

    <div class="formats">
      <div class="fmt-tag">.GBC</div>
      <div class="fmt-tag">.GB</div>
    </div>

    <button class="play-btn" id="playBtn" onclick="startGame()">▶ PLAY NOW</button>
  </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="screen-game">

  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">◀ BACK</button>
    <div class="game-title" id="gameTitle">—</div>
    <div class="sys-badge">GBC</div>
  </div>

  <!-- Game canvas -->
  <div class="game-area">
    <div id="game-container">
      <div id="loading-overlay">
        <div class="loading-icon">⚙️</div>
        <div class="loading-text" id="loadingText">LOADING...</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>
  </div>

  <!-- ── Classic Gamepad ── -->
  <div class="gamepad-wrap">

    <!-- SELECT + START -->
    <div class="mid-btns">
      <button class="btn-mid" data-key="Shift" data-code="16">SELECT</button>
      <button class="btn-mid" data-key="Enter" data-code="13">START</button>
    </div>

    <!-- D-PAD + A/B -->
    <div class="main-btns">

      <!-- D-pad -->
      <div class="dpad">
        <div class="dpad-btn dpad-up"    data-key="ArrowUp"    data-code="38">▲</div>
        <div class="dpad-btn dpad-left"  data-key="ArrowLeft"  data-code="37">◀</div>
        <div class="dpad-center"></div>
        <div class="dpad-btn dpad-right" data-key="ArrowRight" data-code="39">▶</div>
        <div class="dpad-btn dpad-down"  data-key="ArrowDown"  data-code="40">▼</div>
      </div>

      <!-- A + B -->
      <div class="ab-wrap">
        <div class="ab-col">
          <button class="btn-action btn-b" data-key="x" data-code="88">B</button>
          <div class="ab-label">B</div>
        </div>
        <div class="ab-col">
          <button class="btn-action btn-a" data-key="z" data-code="90">A</button>
          <div class="ab-label">A</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── File selection ──────────────────────────────────
  let selectedFile = null;

  function handleFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['gbc','gb'].includes(ext)) { alert('Please select a .gbc or .gb file!'); return; }
    selectedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = (file.size/1024).toFixed(1) + ' KB';
    document.getElementById('fileInfo').classList.add('show');
    document.getElementById('playBtn').classList.add('active');
  }

  document.getElementById('romFile').addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('romFileMobile').addEventListener('change', e => handleFile(e.target.files[0]));

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  // ── Start game ──────────────────────────────────────
  function startGame() {
    if (!selectedFile) return;

    document.getElementById('screen-home').style.display = 'none';
    document.getElementById('screen-game').style.display = 'flex';
    document.getElementById('gameTitle').textContent = selectedFile.name.replace(/\.(gb|gbc)$/i,'');

    document.getElementById('progressBar').style.width = '30%';

    const romUrl = URL.createObjectURL(selectedFile);

    document.getElementById('progressBar').style.width = '60%';
    document.getElementById('loadingText').textContent = 'LOADING EMULATOR...';

    window.EJS_player         = '#game-container';
    window.EJS_core           = 'gambatte';
    window.EJS_gameUrl        = romUrl;
    window.EJS_pathtodata     = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_color          = '#ff6fd8';
    window.EJS_startOnLoaded  = true;
    window.EJS_VirtualGamepad = false;   // ปิด — เราใช้ gamepad ของเราเอง

    window.EJS_onGameStart = function() {
      document.getElementById('progressBar').style.width = '100%';
      URL.revokeObjectURL(romUrl);
      setTimeout(function() {
        document.getElementById('loading-overlay').classList.add('hide');
        initGamepad();
      }, 300);
    };

    const script = document.createElement('script');
    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    script.onerror = function() {
      document.getElementById('loading-overlay').innerHTML =
        '<div class="error-text">❌ Could not load emulator.<br/>Check internet connection.</div>';
    };
    document.body.appendChild(script);
  }

  // ── Classic Gamepad ────────────────────────────────
  function initGamepad() {
    const buttons = document.querySelectorAll('[data-key]');

    buttons.forEach(function(btn) {
      const key  = btn.dataset.key;
      const code = parseInt(btn.dataset.code);

      function press(e) {
        e.preventDefault();
        btn.classList.add('pressed');
        document.dispatchEvent(new KeyboardEvent('keydown', {
          key: key, keyCode: code, which: code, bubbles: true, cancelable: true
        }));
      }
      function release(e) {
        e.preventDefault();
        btn.classList.remove('pressed');
        document.dispatchEvent(new KeyboardEvent('keyup', {
          key: key, keyCode: code, which: code, bubbles: true, cancelable: true
        }));
      }

      btn.addEventListener('touchstart',  press,   { passive:false });
      btn.addEventListener('touchend',    release, { passive:false });
      btn.addEventListener('touchcancel', release, { passive:false });
      btn.addEventListener('mousedown',   press);
      btn.addEventListener('mouseup',     release);
      btn.addEventListener('mouseleave',  release);
    });
  }

  // ── Go back ────────────────────────────────────────
  function goBack() { window.location.reload(); }
</script>
</body>
</html>
